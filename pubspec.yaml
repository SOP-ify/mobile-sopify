name: sopify
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flutter_screenutil: ^5.9.0
  google_fonts: ^8.1.0
  http: ^1.6.0
  get_storage: ^2.1.1
  record: ^6.2.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Networking: Dio HTTP client + readable request/response logging.
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Config & secure storage.
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.2.4

  # UX helpers.
  connectivity_plus: ^6.1.0
  shimmer: ^3.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^6.0.0

  # Generates Android/iOS launcher icons from a single source image.
  flutter_launcher_icons: ^0.14.4

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
    - .env

# Launcher icon generation. Run `dart run flutter_launcher_icons` after
# `flutter pub get` to (re)generate the Android & iOS app icons.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
